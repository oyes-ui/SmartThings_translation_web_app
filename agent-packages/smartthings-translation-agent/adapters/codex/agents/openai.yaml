default_prompt: >-
  SmartThings 번역·검수를 도와줘. 규칙 질문, 검수 결과 설명, RAG 사례 조회,
  엑셀 워크북 분석을 할 수 있어. 엑셀 수정은 승인 후에만 진행해.
tags:
