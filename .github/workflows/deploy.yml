name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Reset Git and Push
        env:
          HF_TOKEN: ${{ secrets.OYES_GITHUB }}
        run: |
          # 1. 문제 폴더 삭제
          rm -rf Mac_ui.app
          
          # 2. Git 초기화 및 설정
          rm -rf .git
          git init
          git config user.email "oyes-ui@users.noreply.github.com"
          git config user.name "oyes-ui"

          # 3. 대용량 바이너리(RAG DB 등)는 LFS로 추적 — HF Space push는 파일당 10MB 제한
          git lfs install
          git lfs track "*.sqlite3" "*.db" "*.bin" "*.pickle"

          # 4. 현재 파일을 'main' 브랜치 이름으로 추가
          git checkout -b main
          git add .
          git commit -m "Final clean deploy for Antigravity"

          # 5. Hugging Face로 강제 푸시 (주소 오타 수정됨)
          git push --force https://x-token:$HF_TOKEN@huggingface.co/spaces/oyes-ui/SmartThings_Translation_Web_App main
