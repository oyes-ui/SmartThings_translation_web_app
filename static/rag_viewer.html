<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Knowledge Base Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060913; --panel: rgba(15,23,42,0.85); --border: rgba(51,65,85,0.5);
    --accent: #3b82f6; --success: #10b981; --warn: #f59e0b; --err: #ef4444;
    --text: #f8fafc; --muted: #94a3b8; --mono: 'JetBrains Mono', monospace;
    --ui: 'Inter', sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background: radial-gradient(circle at 50% 20%, #1e293b, #060913); color:var(--text); font-family:var(--ui); min-height:100vh; }

  /* Header */
  header { background: rgba(15,23,42,0.9); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  header h1 { font-size:17px; font-weight:600; }
  header a { color:var(--muted); font-size:13px; text-decoration:none; }
  header a:hover { color:var(--text); }

  /* Stats bar */
  .stats-bar { display:flex; gap:16px; padding:16px 28px; background:rgba(0,0,0,0.2); border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .stat { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:10px 18px; display:flex; flex-direction:column; gap:2px; }
  .stat .val { font-size:22px; font-weight:700; color:var(--accent); }
  .stat .lbl { font-size:11px; color:var(--muted); }

  /* Two-tab layout */
  .tabs { display:flex; gap:0; padding:20px 28px 0; border-bottom:1px solid var(--border); }
  .tab { padding:10px 20px; font-size:13px; font-weight:500; cursor:pointer; border-bottom:2px solid transparent; color:var(--muted); transition:.2s; }
  .tab.active { color:var(--text); border-bottom-color:var(--accent); }

  /* Content area */
  .content { padding:20px 28px; }

  /* Filter row */
  .filters { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
  select, input[type="text"] {
    background:var(--panel); border:1px solid var(--border); color:var(--text);
    padding:8px 12px; border-radius:8px; font-size:13px; font-family:var(--ui); outline:none; transition:.2s;
  }
  select:focus, input:focus { border-color:var(--accent); }
  select { min-width:150px; cursor:pointer; }
  input[type="text"] { flex:1; min-width:200px; }
  button { background:var(--accent); color:#fff; border:none; padding:8px 18px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; transition:.2s; }
  button:hover { filter:brightness(1.15); }
  button.sec { background:var(--panel); color:var(--text); border:1px solid var(--border); }
  button.sec:hover { background:rgba(255,255,255,0.08); }

  /* Table */
  .table-wrap { overflow-x:auto; border-radius:10px; border:1px solid var(--border); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { background:rgba(255,255,255,0.04); padding:10px 14px; text-align:left; font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.5px; text-transform:uppercase; white-space:nowrap; border-bottom:1px solid var(--border); }
  tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); transition:.15s; }
  tbody tr:hover { background:rgba(255,255,255,0.025); }
  tbody td { padding:9px 14px; vertical-align:top; line-height:1.5; }
  .badge { display:inline-block; padding:2px 8px; border-radius:5px; font-size:11px; font-weight:600; font-family:var(--mono); }
  .badge.kr { background:rgba(16,185,129,.15); color:var(--success); }
  .badge.us { background:rgba(59,130,246,.15); color:var(--accent); }
  .lang-tag { display:inline-block; padding:2px 7px; border-radius:5px; font-size:11px; background:rgba(245,158,11,.1); color:var(--warn); font-family:var(--mono); }
  .src-text { color:var(--muted); font-size:12px; max-width:260px; }
  .tgt-text { max-width:280px; }
  .section-code { font-family:var(--mono); font-size:11px; color:var(--muted); }

  /* Pagination */
  .pagination { display:flex; gap:8px; align-items:center; justify-content:center; margin-top:16px; }
  .pagination button { padding:6px 14px; font-size:12px; }
  .page-info { font-size:12px; color:var(--muted); min-width:100px; text-align:center; }

  /* Similar search tab */
  .sim-box { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:18px; }
  .sim-box label { font-size:12px; color:var(--muted); display:block; margin-bottom:6px; }
  .sim-box .row { display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; }
  .sim-box .field { display:flex; flex-direction:column; gap:4px; flex:1; min-width:200px; }
  .sim-result { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:14px 18px; margin-bottom:10px; }
  .sim-result .sim-score { font-size:11px; color:var(--muted); margin-bottom:6px; }
  .sim-result .sim-src { font-size:13px; margin-bottom:4px; }
  .sim-result .sim-tgt { font-size:13px; color:var(--success); }
  .sim-result .sim-meta { font-size:11px; font-family:var(--mono); color:var(--muted); margin-top:6px; }

  /* Loading */
  .loading { text-align:center; padding:40px; color:var(--muted); }
  .empty { text-align:center; padding:40px; color:var(--muted); font-size:13px; }
</style>
</head>
<body>

<header>
  <h1>🧠 RAG Knowledge Base Viewer</h1>
  <a href="/">← 메인으로</a>
</header>

<!-- Stats bar -->
<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="val" id="sTotalPairs">—</div><div class="lbl">번역 쌍</div></div>
  <div class="stat"><div class="val" id="sKrVec">—</div><div class="lbl">KR 벡터</div></div>
  <div class="stat"><div class="val" id="sUsVec">—</div><div class="lbl">US 벡터</div></div>
  <div class="stat"><div class="val" id="sFiles">—</div><div class="lbl">처리 파일</div></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('browse')">📋 레코드 브라우저</div>
  <div class="tab" onclick="switchTab('similar')">🔍 유사도 검색</div>
</div>

<!-- Browse Tab -->
<div class="content" id="tabBrowse">
  <div class="filters">
    <select id="fStory"><option value="">전체 스토리</option></select>
    <select id="fLang"><option value="">전체 언어</option></select>
    <select id="fGroup" onchange="loadRecords(1)">
      <option value="">전체 (KR + US)</option>
      <option value="kr">KR 기준 (JA/CN/TW/US)</option>
      <option value="us">US 기준 (기타 언어)</option>
    </select>
    <input type="text" id="fSearch" placeholder="원문 또는 번역문 검색..." style="min-width:240px">
    <button onclick="loadRecords(1)">검색</button>
    <button class="sec" onclick="resetFilters()">초기화</button>
  </div>

  <div id="browseLoading" class="loading" style="display:none">로딩 중...</div>

  <div class="table-wrap" id="tableWrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th>스토리</th>
          <th>섹션 코드</th>
          <th>그룹</th>
          <th>원문</th>
          <th>언어</th>
          <th>번역문</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div id="browseEmpty" class="empty" style="display:none">결과 없음</div>

  <div class="pagination" id="pagination"></div>
</div>

<!-- Similar Search Tab -->
<div class="content" id="tabSimilar" style="display:none">
  <div class="sim-box">
    <div class="row">
      <div class="field">
        <label>검색 원문 (영어 또는 한국어)</label>
        <input type="text" id="simQuery" placeholder="예: This AI helps pay the bills">
      </div>
      <div class="field" style="max-width:220px">
        <label>타겟 언어</label>
        <select id="simLang"><option value="all">전체 검색 (All)</option></select>
      </div>
      <div class="field" style="max-width:100px">
        <label>결과 수</label>
        <input type="number" id="simN" value="5" min="1" max="20" style="width:80px">
      </div>
      <button onclick="runSimilar()" style="align-self:flex-end; height:36px">검색</button>
    </div>
  </div>
  <div id="simResults"></div>
</div>

<script>
const API = '/api';
let currentPage = 1;
let allStories = [], allLangs = [];

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  // Stats
  try {
    const s = await fetch(`${API}/rag_status`).then(r => r.json());
    if (s.available) {
      document.getElementById('sTotalPairs').textContent = s.total_pairs.toLocaleString();
      document.getElementById('sKrVec').textContent = s.kr_vectors.toLocaleString();
      document.getElementById('sUsVec').textContent = s.us_vectors.toLocaleString();
      document.getElementById('sFiles').textContent = s.processed_files;
    }
  } catch(e) {}

  // Initial browse load (get stories & langs)
  await loadRecords(1);
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='browse'&&i===0)||(tab==='similar'&&i===1)));
  document.getElementById('tabBrowse').style.display = tab === 'browse' ? '' : 'none';
  document.getElementById('tabSimilar').style.display = tab === 'similar' ? '' : 'none';
}

// ─── Browse ───────────────────────────────────────────────────────────────────
async function loadRecords(page = 1) {
  currentPage = page;
  const story = document.getElementById('fStory').value;
  const lang  = document.getElementById('fLang').value;
  const grp   = document.getElementById('fGroup').value;
  const srch  = document.getElementById('fSearch').value.trim();

  const params = new URLSearchParams({ page, page_size: 30 });
  if (story) params.set('story_id', story);
  if (lang)  params.set('target_lang', lang);
  if (grp)   params.set('source_group', grp);
  if (srch)  params.set('search', srch);

  document.getElementById('browseLoading').style.display = '';
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('browseEmpty').style.display = 'none';
  document.getElementById('pagination').innerHTML = '';

  try {
    const data = await fetch(`${API}/rag_browse?${params}`).then(r => r.json());

    // Populate selects (first call)
    if (allStories.length === 0 && data.stories) {
      allStories = data.stories;
      const sel = document.getElementById('fStory');
      data.stories.forEach(s => { const o = document.createElement('option'); o.value=s; o.textContent=s; sel.appendChild(o); });

      allLangs = data.langs;
      const lsel = document.getElementById('fLang');
      data.langs.forEach(l => { const o = document.createElement('option'); o.value=l; o.textContent=l; lsel.appendChild(o); });

      // Also populate similar lang select
      const ssel = document.getElementById('simLang');
      // "All" is already there, append the rest
      data.langs.forEach(l => { 
          if(l) {
            const o = document.createElement('option'); 
            o.value=l; 
            o.textContent=l; 
            ssel.appendChild(o); 
          }
      });
    }

    // Now filtering is done server-side
    let records = data.records;

    document.getElementById('browseLoading').style.display = 'none';

    if (records.length === 0) {
      document.getElementById('browseEmpty').style.display = '';
      return;
    }

    // Render table
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';
    records.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span style="font-family:var(--mono);font-size:11px">${esc(r.story_id)}</span></td>
        <td><span class="section-code">${esc(r.section_code)}</span></td>
        <td><span class="badge ${r.source_group}">${r.source_group.toUpperCase()}</span></td>
        <td class="src-text">${esc(r.source_text)}</td>
        <td><span class="lang-tag">${esc(r.target_lang)}</span></td>
        <td class="tgt-text">${esc(r.target_text)}</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('tableWrap').style.display = '';

    // Pagination
    const totalPages = Math.ceil(data.total / data.page_size);
    renderPagination(page, totalPages, data.total);

  } catch(e) {
    document.getElementById('browseLoading').style.display = 'none';
    document.getElementById('browseEmpty').style.display = '';
    document.getElementById('browseEmpty').textContent = '오류: ' + e.message;
  }
}

function renderPagination(page, total, totalRecords) {
  const el = document.getElementById('pagination');
  el.innerHTML = '';
  if (total <= 1) return;

  const prev = document.createElement('button');
  prev.className = 'sec'; prev.textContent = '← 이전';
  prev.disabled = page <= 1;
  prev.onclick = () => loadRecords(page - 1);
  el.appendChild(prev);

  const info = document.createElement('div');
  info.className = 'page-info';
  info.textContent = `${page} / ${total} 페이지 (${totalRecords.toLocaleString()}건)`;
  el.appendChild(info);

  const next = document.createElement('button');
  next.className = 'sec'; next.textContent = '다음 →';
  next.disabled = page >= total;
  next.onclick = () => loadRecords(page + 1);
  el.appendChild(next);
}

function resetFilters() {
  document.getElementById('fStory').value = '';
  document.getElementById('fLang').value = '';
  document.getElementById('fGroup').value = '';
  document.getElementById('fSearch').value = '';
  loadRecords(1);
}

// Enter key on search
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('fSearch').addEventListener('keydown', e => { if(e.key==='Enter') loadRecords(1); });
  document.getElementById('simQuery').addEventListener('keydown', e => { if(e.key==='Enter') runSimilar(); });
});

// ─── Similar search ───────────────────────────────────────────────────────────
async function runSimilar() {
  const query = document.getElementById('simQuery').value.trim();
  const lang  = document.getElementById('simLang').value;
  const n     = document.getElementById('simN').value;
  const el    = document.getElementById('simResults');

  if (!query) { el.innerHTML = '<div class="empty">검색할 원문을 입력하세요.</div>'; return; }

  el.innerHTML = '<div class="loading">검색 중...</div>';

  try {
    const data = await fetch(`${API}/rag_similar?${new URLSearchParams({query, target_lang: lang, n})}`).then(r => r.json());
    if (!data.results || data.results.length === 0) {
      el.innerHTML = '<div class="empty">유사 결과 없음 (DB를 먼저 빌드하세요)</div>';
      return;
    }
    el.innerHTML = data.results.map((r, i) => `
      <div class="sim-result">
        <div class="sim-score">#${i+1} &nbsp; 유사도: <strong>${(r.similarity_score*100).toFixed(1)}%</strong> &nbsp;|&nbsp; 섹션: <code>${esc(r.section_code)}</code> &nbsp;|&nbsp; ${esc(r.story_id)}</div>
        <div class="sim-src">🔤 <strong>원문:</strong> ${esc(r.source)}</div>
        <div class="sim-tgt">✅ <strong>번역:</strong> ${esc(r.target)}</div>
      </div>
    `).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty">오류: ${esc(e.message)}</div>`;
  }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
