<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Universe — SmartThings</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --text: #f1f5f9; --dim: #94a3b8;
    --border: #334155; --blue: #3b82f6; --green: #10b981; --purple: #8b5cf6;
    --orange: #f59e0b; --red: #ef4444; --font: 'Inter', system-ui, sans-serif;
  }
  body, html {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--bg); color: var(--text); font-family: var(--font);
    overflow: hidden; display: flex;
  }
  #cy { flex: 1; height: 100%; background: var(--bg); }
  
  /* Sidebar */
  #sidebar {
    width: 350px; background: var(--panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; box-shadow: -4px 0 15px rgba(0,0,0,0.3);
    z-index: 10;
  }
  .sidebar-head {
    padding: 20px; border-bottom: 1px solid var(--border);
  }
  .sidebar-head h2 { margin: 0; font-size: 18px; color: var(--blue); }
  .sidebar-head p { margin: 5px 0 0 0; font-size: 12px; color: var(--dim); }
  
  .sidebar-body { padding: 20px; flex: 1; overflow-y: auto; line-height: 1.6; }
  .node-title { font-weight: 600; font-size: 16px; margin-bottom: 10px; display: block; }
  .node-type {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px;
    text-transform: uppercase; font-weight: bold; margin-bottom: 15px;
  }
  .type-core { background: var(--blue); color: #fff; }
  .type-language { background: var(--green); color: #fff; }
  .type-context { background: var(--orange); color: #fff; }
  .type-style { background: var(--purple); color: #fff; }
  .type-branch { background: var(--dim); color: #fff; }
  
  .content-box {
    background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; white-space: pre-wrap;
    border: 1px solid var(--border); color: #cbd5e1;
  }
  
  .back-link {
    display: inline-flex; align-items: center; text-decoration: none;
    color: var(--dim); font-size: 12px; margin-bottom: 15px; transition: color 0.2s;
  }
  .back-link:hover { color: var(--text); }

  /* Controls */
  .controls {
    position: absolute; bottom: 20px; left: 20px; display: flex; gap: 10px; z-index: 5;
  }
  .btn {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .btn:hover { background: var(--border); }
</style>
</head>
<body>

<div id="cy"></div>

<div class="controls">
  <button class="btn" onclick="cy.fit()">전체 맞춤</button>
  <button class="btn" onclick="location.reload()">새로고침</button>
</div>

<aside id="sidebar">
  <div class="sidebar-head">
    <a href="demo.html" class="back-link">← Inspector로 돌아가기</a>
    <h2>Module Details</h2>
    <p>노드를 클릭하여 세부 규칙을 확인하세요.</p>
  </div>
  <div class="sidebar-body" id="details">
    <div style="text-align:center; padding-top: 50px; color: var(--dim);">
      시각화된 노드를 선택해 주세요.
    </div>
  </div>
</aside>

<script>
let cy;

async function init() {
  try {
    const res = await fetch('/api/prompt_universe');
    const data = await res.json();
    
    cy = cytoscape({
      container: document.getElementById('cy'),
      elements: data.elements,
      style: [
        {
          selector: 'node',
          style: {
            'label': 'data(label)',
            'color': '#f1f5f9',
            'font-family': 'Inter',
            'font-size': '10px',
            'text-valign': 'center',
            'text-halign': 'center',
            'background-color': '#334155',
            'width': '120px', 'height': '40px',
            'shape': 'round-rectangle',
            'border-width': 1, 'border-color': '#475569'
          }
        },
        {
          selector: 'node[type="core"]',
          style: { 'background-color': '#1d4ed8', 'width': '140px', 'height': '50px', 'font-weight': 'bold' }
        },
        {
          selector: 'node[type="branch"]',
          style: { 'background-color': '#475569', 'shape': 'ellipse', 'width': '80px', 'height': '80px' }
        },
        {
          selector: 'node[type="language"]',
          style: { 'background-color': '#065f46' }
        },
        {
          selector: 'node[type="context"]',
          style: { 'background-color': '#92400e' }
        },
        {
          selector: 'node[type="style"]',
          style: { 'background-color': '#6b21a8' }
        },
        {
          selector: 'edge',
          style: {
            'width': 2,
            'line-color': '#334155',
            'target-arrow-color': '#334155',
            'target-arrow-shape': 'triangle',
            'curve-style': 'bezier'
          }
        }
      ],
      layout: {
        name: 'breadthfirst',
        directed: true,
        padding: 50,
        spacingFactor: 1.5
      }
    });

    cy.on('tap', 'node', function(evt){
      const node = evt.target;
      renderDetails(node.data());
    });

  } catch (err) {
    document.getElementById('details').innerHTML = `<p style="color:var(--red)">데이터 로드 실패: ${err.message}</p>`;
  }
}

function renderDetails(data) {
  const el = document.getElementById('details');
  el.innerHTML = `
    <span class="node-type type-${data.type}">${data.type}</span>
    <span class="node-title">${data.label}</span>
    <div class="content-box">${data.content}</div>
  `;
}

init();
</script>
</body>
</html>
