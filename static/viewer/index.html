<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translation Review Visualizer</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- html2pdf.js for exporting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header nav-blur">
            <div class="header-content">
                <div class="logo">
                    <i class="ri-translate-2"></i>
                    <h1>Review Visualizer</h1>
                </div>
                <div class="header-actions">
                    <button id="export-btn" class="btn btn-primary" style="display: none;">
                        <i class="ri-file-pdf-line"></i>
                        <span>PDF 다운로드</span>
                    </button>
                    <button id="theme-toggle" class="btn btn-icon">
                        <i class="ri-moon-line"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Layout with Sidebar -->
        <div class="main-layout">
            <!-- Sidebar Navigation -->
            <aside class="sidebar" id="sidebar" style="display: none;">
                <div class="sidebar-inner">
                    <h3 class="sidebar-title">목차 (Languages)</h3>
                    <nav class="nav-menu" id="nav-menu">
                        <!-- Navigation Links injected here -->
                    </nav>
                    <div class="version-info" style="margin-top: auto; padding: 20px 0 10px 0; border-top: 1px solid rgba(0,0,0,0.05); font-size: 11px; color: #94a3b8; display: flex; flex-direction: column; gap: 4px;">
                        <span>Version v1.4.0</span>
                        <span>Updated: 2026.04.15</span>
                    </div>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="content-area">
                <!-- Upload Section -->
                <section id="upload-section" class="upload-container">
                    <div class="upload-box" id="drop-zone">
                        <input type="file" id="file-input" accept=".txt" hidden>
                        <div class="upload-icon">
                            <i class="ri-file-text-line"></i>
                        </div>
                        <h2>TXT 리포트 파일을 업로드하세요</h2>
                        <p class="upload-hint">파일을 여길 드래그하거나 클릭하여 선택하세요.</p>
                        <button class="btn btn-primary mt-4" onclick="document.getElementById('file-input').click()">
                            파일 선택
                        </button>
                    </div>
                </section>

                <!-- Dashboard / Executive Summary -->
                <section id="dashboard" class="dashboard-section" style="display: none;">
                    <div class="dashboard-header">
                        <h2>리포트 요약 (Executive Summary)</h2>
                    </div>
                    <div class="dashboard-grid" id="dashboard-content">
                        <!-- Dashboard widgets injected here -->
                    </div>
                </section>

                <!-- Report Items -->
                <section id="report-content" class="report-container" style="display: none;">
                    <div class="report-header">
                        <h2>상세 검수 항목</h2>
                    </div>
                    <div id="items-list" class="items-grid">
                        <!-- Cards will be injected here -->
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>

</html>
